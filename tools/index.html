<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finn Reese | Tools</title>
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="./style.css">
    <link rel="shortcut icon" href="../favicon.png" type="image/x-icon">
    <base href="./">
  </head>
  <body>
    <h1>
      <button class="icon-button back-to-pieces" id="back">
        <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" fill="currentColor" viewBox="0 0 256 256"><path d="M224,128a8,8,0,0,1-8,8H59.31l58.35,58.34a8,8,0,0,1-11.32,11.32l-72-72a8,8,0,0,1,0-11.32l72-72a8,8,0,0,1,11.32,11.32L59.31,120H216A8,8,0,0,1,224,128Z"></path></svg>
      </button>
      Musical Tools
    </h1>
    <div class="card">
      <h2>Perusal Score Watermarks</h2>
      <div class="row" id="watermark-images">
        <img src="./normal.png" alt="Normal Score">
        <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" fill="curentColor" viewBox="0 0 256 256"><path d="M237.66,122.34l-96-96A8,8,0,0,0,128,32V72H48A16,16,0,0,0,32,88v80a16,16,0,0,0,16,16h80v40a8,8,0,0,0,13.66,5.66l96-96A8,8,0,0,0,237.66,122.34ZM144,204.69V176a8,8,0,0,0-8-8H48V88h88a8,8,0,0,0,8-8V51.31L220.69,128Z"></path></svg>
        <img src="./watermarked.png" alt="Watermarked Score">
      </div>
      <div class="input-wrapper">
          <label for="large-text">Large Text</label>
          <input type="text" id="large-text" placeholder=" " value="FOR PERUSAL ONLY">
      </div>
      <div class="input-wrapper textarea">
          <label for="bottom-text">Bottom Text</label>
          <textarea type="text" id="bottom-text" placeholder=" ">This score is for perusal only. It can not be used for performance or rehearsal.</textarea>
          <div class="textarea-resizer">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256"><rect width="256" height="256" fill="none"/><line x1="208" y1="128" x2="128" y2="208" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="16"/><line x1="192" y1="40" x2="40" y2="192" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="16"/></svg>
          </div>
      </div>
      <div class="row">
        <input type="file" id="pdf-upload" accept="application/pdf" style="display: none;">
        <button id="upload" class="normal-button">
          Upload PDF <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" fill="currentColor" viewBox="0 0 256 256"><path d="M224,144v64a8,8,0,0,1-8,8H40a8,8,0,0,1-8-8V144a8,8,0,0,1,16,0v56H208V144a8,8,0,0,1,16,0ZM93.66,77.66,120,51.31V144a8,8,0,0,0,16,0V51.31l26.34,26.35a8,8,0,0,0,11.32-11.32l-40-40a8,8,0,0,0-11.32,0l-40,40A8,8,0,0,0,93.66,77.66Z"></path></svg>
        </button>
        <button id="add-watermark" class="normal-button">
          Add Watermark <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" fill="currentColor" viewBox="0 0 256 256"><path d="M224,144v64a8,8,0,0,1-8,8H40a8,8,0,0,1-8-8V144a8,8,0,0,1,16,0v56H208V144a8,8,0,0,1,16,0Zm-101.66,5.66a8,8,0,0,0,11.32,0l40-40a8,8,0,0,0-11.32-11.32L136,124.69V32a8,8,0,0,0-16,0v92.69L93.66,98.34a8,8,0,0,0-11.32,11.32Z"></path></svg>
        </button>
      </div>
      <span id="upload-output">No File Uploaded</span>
    </div>
    <script src="/tools/pdf-lib.min.js"></script>
    <script src="/tools/script.js"></script>
  </body>
</html>

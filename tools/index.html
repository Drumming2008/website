<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finn Reese | Tools</title>
    <link rel="stylesheet" href="/style.css">
    <link rel="stylesheet" href="/tools/style.css">
    <link rel="shortcut icon" href="/favicon.png" type="image/x-icon">
  </head>
  <body>
    <h1>Musical Tools</h1>
    <div class="card">
      <h2>Perusal Score Watermarks</h2>
      <div class="input-wrapper">
          <label for="large-text">Large Text</label>
          <input type="text" id="large-text" placeholder=" " required value="FOR PERUSAL ONLY">
      </div>
      <div class="input-wrapper">
          <label for="bottom-text">Bottom Text</label>
          <input type="text" id="bottom-text" placeholder=" " required value="This score is for perusal only. It can not be used for performance or rehearsal.">
      </div>
      <div class="row">
        <input type="file" id="pdf-upload" accept="application/pdf" style="display: none;">
        <button id="upload" class="normal-button">
          Upload PDF <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" fill="currentColor" viewBox="0 0 256 256"><path d="M224,144v64a8,8,0,0,1-8,8H40a8,8,0,0,1-8-8V144a8,8,0,0,1,16,0v56H208V144a8,8,0,0,1,16,0ZM93.66,77.66,120,51.31V144a8,8,0,0,0,16,0V51.31l26.34,26.35a8,8,0,0,0,11.32-11.32l-40-40a8,8,0,0,0-11.32,0l-40,40A8,8,0,0,0,93.66,77.66Z"></path></svg>
        </button>
        <button id="add-watermark" class="normal-button">
          Add Watermark <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" fill="currentColor" viewBox="0 0 256 256"><path d="M224,144v64a8,8,0,0,1-8,8H40a8,8,0,0,1-8-8V144a8,8,0,0,1,16,0v56H208V144a8,8,0,0,1,16,0Zm-101.66,5.66a8,8,0,0,0,11.32,0l40-40a8,8,0,0,0-11.32-11.32L136,124.69V32a8,8,0,0,0-16,0v92.69L93.66,98.34a8,8,0,0,0-11.32,11.32Z"></path></svg>
        </button>
      </div>
      <span id="upload-output">No File Uploaded</span>
    </div>
    <script src="/tools/pdf-lib.min.js"></script>
    <script src="/tools/script.js"></script>
  </body>
</html>
